<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect x="4" y="4" width="56" height="56" rx="8" fill="#1b7a3d"/>
  <!-- polygon being split -->
  <polygon points="14,20 34,14 50,26 46,48 20,50" fill="#ffffff" fill-opacity="0.9"/>
  <!-- split line cutting through -->
  <line x1="10" y1="46" x2="54" y2="16" stroke="#e04b2f" stroke-width="4" stroke-linecap="round"/>
  <!-- vertices -->
