<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect x="3" y="3" width="58" height="58" rx="10" fill="#0f6e63"/>
  <!-- line network being noded -->
  <g fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round">
    <path d="M8 40 L26 24 L40 30 L56 16"/>   <!-- main polyline through two nodes -->
    <path d="M26 24 L24 52"/>                 <!-- T-branch down from a node -->
    <path d="M40 30 L52 50"/>                 <!-- branch to lower-right -->
  </g>
  <!-- dangling end extended (dashed) to reach the network at a new node -->
  <path d="M14 14 L26 24" fill="none" stroke="#ffd23f" stroke-width="3.2"
        stroke-linecap="round" stroke-dasharray="1.5 4"/>
  <!-- nodes (split points) -->
  <g fill="#ffd23f" stroke="#0f6e63" stroke-width="1.6">
    <circle cx="26" cy="24" r="4.6"/>
    <circle cx="40" cy="30" r="4.6"/>
  </g>
</svg>
